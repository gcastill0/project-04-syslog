# Listens for syslog messages over UDP on the standard port (514).
# flags(no-parse) passes the raw message through without syslog-ng attempting
# to parse or reformat it, preserving the original format from the sending device.
source s_udp_syslog {
  network(
    transport("udp")
    port(514)
    flags(no-parse)
  );
};

# Forwards messages to the SentinelOne Data Pipeline via HTTP Event Collector (HEC).
# The raw endpoint accepts plain syslog text rather than a JSON envelope.
destination d_datapipelines_hec_syslog {
  http(
    url("https://ingest.na1.sentinelone.net/services/collector/raw")
    headers("Authorization: Splunk DPM_HEC_TOKEN", "Content-Type: text/plain")
    body("${MESSAGE}")
    body-suffix("\n")       # Newline-separates events within a batch so the
                            # HEC endpoint can split them back into individual records.
    method("POST")
    content-compression("gzip")  # Compresses batches before sending, reducing
                                 # bandwidth at the cost of negligible CPU overhead.
    batch-lines(5000)       # Send when 5000 messages have accumulated...
    batch-bytes(6000Kb)     # ...or when the batch reaches 6MB...
    batch-timeout(10000)    # ...or after 10 seconds, whichever comes first.
    retries(1)              # On failure, attempt one retry before discarding.
    workers(4)              # Four parallel HTTP workers for throughput.
  );
};

log {
  source(s_udp_syslog);
  destination(d_datapipelines_hec_syslog);
};
