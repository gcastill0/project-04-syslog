# ------------------------------------------------------------
# Specific configuration syntax version expected by syslog-ng.
# This ensures the configuration is validated against the 3.38
# syntax rules and enables compatibility checks.
# It does not force the runtime binary version, only the config format.
# ------------------------------------------------------------
# Comment this line if moving as we move to Ubuntu Noble and we
# upgrade to Syslog-ng 4.4+
# ------------------------------------------------------------
# @version: 3.38

# ------------------------------------------------------------
# Include the Syslog Configuration Library (SCL).
# This loads built-in parsers, templates, reusable macros,
# and common driver definitions provided by syslog-ng.
# It allows use of standardized components without redefining them.
# ------------------------------------------------------------
# Comment this line if moving as we move to Ubuntu Noble and we
# upgrade to Syslog-ng 4.4+
# ------------------------------------------------------------
#@include "scl.conf"

# ------------------------------------------------------------
# Source: single UDP port for all devices
# Notes:
# - UDP is lossy by nature. These socket buffers help under burst load,
#   but they cannot prevent loss before syslog-ng receives packets.
# ------------------------------------------------------------
source s_udp_all {
  network(
    transport("udp")
    port(514)
    flags(no-parse)
    so_rcvbuf(425984)   # 416 KB
    so_sndbuf(851968)   # 832 KB
  );
};

# ------------------------------------------------------------
# Filter: f_cisco_ios
# Cisco IOS typically includes "%<FACILITY>-<SEVERITY>-<MNEMONIC>" tokens.
# Tune these patterns to match your real payloads deterministically.
# ------------------------------------------------------------
filter f_cisco_ios {
  match("%[A-Z0-9_]+-[0-7]-[A-Z0-9_]+" value("MESSAGE"));
};

# ------------------------------------------------------------
# Filter: f_watchguard
# WatchGuard Firebox commonly includes "Firebox" and/or "msg_id=" tokens.
# Tune these patterns to match your real payloads deterministically.
# ------------------------------------------------------------

filter f_watchguard {
  match("Firebox" value("MESSAGE"))
  or match("msg_id=" value("MESSAGE"));
};

# ------------------------------------------------------------
# Destinations: SentinelOne HEC (raw)
# Disk buffering:
# - Protects against HTTP endpoint outages, throttling, and syslog-ng restarts
# - Does not protect against UDP packet loss before syslog-ng receives messages
# ------------------------------------------------------------
destination d_sentinelone_hec_cisco {
  http(
    url("https://ingest.us1.sentinelone.net/services/collector/raw?sourcetype=marketplace-custom-cisco")
    headers("Authorization: Bearer LOG_WRITE_ACCESS_KEY", "Content-Type: text/plain")
    body("${MESSAGE}")
    method("POST")
    content-compression("gzip")
    batch-lines(5000)
    batch-bytes(6000Kb)
    batch-timeout(10000)
    retries(3)
    workers(4)

    disk-buffer(
      reliable(yes)
      dir("/var/lib/syslog-ng")
      disk-buf-size(2G)
    )
  );
};

destination d_sentinelone_hec_watchguard {
  http(
    url("https://ingest.us1.sentinelone.net/services/collector/raw?sourcetype=marketplace-custom-watchguard")
    headers("Authorization: Bearer LOG_WRITE_ACCESS_KEY", "Content-Type: text/plain")
    body("${MESSAGE}")
    method("POST")
    content-compression("gzip")
    batch-lines(5000)
    batch-bytes(6000Kb)
    batch-timeout(10000)
    retries(3)
    workers(4)

    disk-buffer(
      reliable(yes)
      dir("/var/lib/syslog-ng")
      disk-buf-size(2G)
    )
  );
};

# ------------------------------------------------------------
# Catch-all destination (unmatched logs)
# ------------------------------------------------------------
destination d_sentinelone_hec_unmatched {
  http(
    url("https://ingest.us1.sentinelone.net/services/collector/raw?sourcetype=unmatched")
    headers("Authorization: Bearer LOG_WRITE_ACCESS_KEY", "Content-Type: text/plain")
    body("${MESSAGE}")
    method("POST")
    content-compression("gzip")
    batch-lines(5000)
    batch-bytes(6000Kb)
    batch-timeout(10000)
    retries(3)
    workers(4)

    disk-buffer(
      reliable(yes)
      dir("/var/lib/syslog-ng")
      disk-buf-size(2G)
    )
  );
};

# ------------------------------------------------------------
# Routing
# - Each matching filter routes to its destination
# - If a message matches both filters, it will be sent to both destinations
# ------------------------------------------------------------
log {
  source(s_udp_all);
  filter(f_cisco_ios);
  destination(d_sentinelone_hec_cisco);
};

log {
  source(s_udp_all);
  filter(f_watchguard);
  destination(d_sentinelone_hec_watchguard);
};

# ------------------------------------------------------------
# Catch-all for unmatched messages. Our goal is to see zero logs
# in this stream. A good candiadate for a quality control detection.
# ------------------------------------------------------------
log {
  source(s_udp_all);
  filter {
    not filter(f_cisco_ios)
    and not filter(f_watchguard);
  };
  destination(d_sentinelone_hec_unmatched);
};